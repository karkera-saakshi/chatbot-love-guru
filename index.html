<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-deep: #8B1A2F;
            --rose-mid: #C0395A;
            --rose-soft: #E8637A;
            --blush: #F5C2CC;
            --blush-light: #FDF0F2;
            --petal: #FAE8EC;
            --cream: #FFF8F9;
            --text-dark: #2C0A12;
            --text-mid: #6B2233;
            --text-muted: #B07080;
            --shadow: rgba(139, 26, 47, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(ellipse at 10% 0%, rgba(232, 99, 122, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 100%, rgba(192, 57, 90, 0.06) 0%, transparent 50%);
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--rose-deep) 0%, var(--rose-mid) 100%);
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 20px rgba(139, 26, 47, 0.25);
            flex-shrink: 0;
        }

        .header-icon {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.55rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.02em;
            line-height: 1.1;
        }

        .header-text p {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.72);
            font-weight: 300;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Status dot */
        .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.7);
            font-weight: 300;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #7FEBA1;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.15); }
        }

        /* Chat window */
        #chatWindow {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        #chatWindow::-webkit-scrollbar {
            width: 4px;
        }

        #chatWindow::-webkit-scrollbar-track {
            background: transparent;
        }

        #chatWindow::-webkit-scrollbar-thumb {
            background: var(--blush);
            border-radius: 4px;
        }

        /* Welcome message */
        .welcome-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 28px 16px 18px;
            animation: fadeUp 0.6s ease both;
        }

        .welcome-heart {
            font-size: 2rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 8px rgba(139, 26, 47, 0.2));
        }

        .welcome-block h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--rose-deep);
            margin-bottom: 6px;
        }

        .welcome-block p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 300;
            max-width: 280px;
            line-height: 1.6;
        }

        /* Messages */
        .userMsg, .botMsg {
            max-width: 78%;
            padding: 11px 15px;
            font-size: 0.92rem;
            line-height: 1.55;
            word-wrap: break-word;
            animation: fadeUp 0.3s ease both;
            position: relative;
        }

        .userMsg {
            background: linear-gradient(135deg, var(--rose-mid) 0%, var(--rose-deep) 100%);
            color: #fff;
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 2px 12px rgba(139, 26, 47, 0.2);
        }

        .botMsg {
            background: #fff;
            color: var(--text-dark);
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
            border: 1px solid rgba(232, 99, 122, 0.18);
            box-shadow: 0 2px 12px var(--shadow);
        }

        .msg-time {
            font-size: 0.65rem;
            margin-top: 4px;
            opacity: 0.55;
            display: block;
        }

        .userMsg .msg-time { color: rgba(255,255,255,0.8); text-align: right; }
        .botMsg .msg-time { color: var(--text-muted); }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #fff;
            border: 1px solid rgba(232, 99, 122, 0.18);
            border-radius: 18px 18px 18px 4px;
            padding: 12px 18px;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .typing-indicator.visible { display: flex; gap: 5px; align-items: center; }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--rose-soft);
            border-radius: 50%;
            animation: typingBounce 1.2s ease infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input area */
        .input-area {
            background: #fff;
            border-top: 1px solid rgba(232, 99, 122, 0.15);
            padding: 14px 18px 18px;
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(139, 26, 47, 0.05);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--petal);
            border-radius: 50px;
            padding: 6px 6px 6px 18px;
            border: 1.5px solid rgba(192, 57, 90, 0.15);
            transition: border-color 0.2s;
        }

        .input-row:focus-within {
            border-color: rgba(192, 57, 90, 0.45);
            box-shadow: 0 0 0 3px rgba(192, 57, 90, 0.07);
        }

        #msg {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text-dark);
            outline: none;
            caret-color: var(--rose-mid);
        }

        #msg::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        #sendBtn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--rose-mid) 0%, var(--rose-deep) 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s;
            flex-shrink: 0;
            box-shadow: 0 2px 10px rgba(139, 26, 47, 0.25);
        }

        #sendBtn:hover {
            transform: scale(1.06);
            box-shadow: 0 4px 14px rgba(139, 26, 47, 0.35);
        }

        #sendBtn:active { transform: scale(0.97); }

        #sendBtn svg {
            width: 17px;
            height: 17px;
            fill: #fff;
        }

        .input-hint {
            text-align: center;
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 9px;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-icon">♡</div>
        <div class="header-text">
            <h1>Love Guru</h1>
            <p>Your personal relationship guide</p>
        </div>
        <div class="status">
            <span class="status-dot"></span>
            Online
        </div>
    </header>

    <div id="chatWindow">
        <div class="welcome-block">
            <h2>Hello, I'm your Love Guru</h2>
            <p>Share what's on your heart. I'm here to guide you through your relationships with care and clarity.</p>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="msg" placeholder="Ask me anything about love..." autocomplete="off" />
            <button id="sendBtn" onclick="sendMsg()" title="Send">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
        <p class="input-hint">Everything shared here stays between us ♡</p>
    </div>

    <script src="chat.js"></script>

</body>
</html>
